<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Sales Tracker - Google Sheets API</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: none;
        }
        
        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }
        
        .loading-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        
        .loading-panel.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-logo {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        
        .loading-title {
            color: #5eead4;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .loading-text {
            color: #94a3b8;
            line-height: 1.6;
        }
        
        .error-panel {
            display: none;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            max-width: 400px;
        }
        
        .sync-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.95);
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            z-index: 999;
            border: 1px solid rgba(94, 234, 212, 0.2);
        }
        
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }
        
        .sync-dot.online {
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        
        .sync-dot.syncing {
            background: #f59e0b;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .control-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 20px 20px 0 0;
            border-top: 1px solid rgba(94, 234, 212, 0.3);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            z-index: 1000;
            max-height: 50vh;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }
        
        .panel-handle {
            width: 40px;
            height: 4px;
            background: #475569;
            border-radius: 2px;
            margin: 0 auto 15px;
            cursor: pointer;
        }
        
        .control-panel h2 {
            color: #5eead4;
            margin-bottom: 12px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .status-active {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .status-inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .stat-box {
            background: rgba(30, 41, 59, 0.8);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .stat-number {
            font-size: 1.4rem;
            font-weight: 700;
            color: #5eead4;
        }
        
        .stat-label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .btn:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }
        
        .customer-list {
            margin-top: 15px;
        }
        
        .customer-list h3 {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .customer-item {
            background: rgba(30, 41, 59, 0.6);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            border-left: 3px solid #ef4444;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .customer-item.nearby {
            border-left-color: #f59e0b;
            background: rgba(245, 158, 11, 0.15);
        }
        
        .customer-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
        }
        
        .customer-info h4 {
            color: #f1f5f9;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }
        
        .customer-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            line-height: 1.4;
        }
        
        .distance-badge {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .distance-badge.nearby {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .distance-badge.reached {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .fab-container {
            position: fixed;
            top: 60px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
        }
        
        .fab {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(94, 234, 212, 0.3);
            color: #5eead4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .proximity-indicator {
            position: fixed;
            top: 80px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f172a;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 1000;
            text-align: center;
            cursor: pointer;
        }
        
        .proximity-indicator.show {
            display: flex;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.98);
            color: #5eead4;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(94, 234, 212, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(-150px);
            transition: transform 0.4s ease;
        }
        
        .notification.show {
            transform: translateY(0);
        }
        
        .notification-icon {
            width: 44px;
            height: 44px;
            background: rgba(94, 234, 212, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        
        .agent-marker {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .error-log {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(239, 68, 68, 0.95);
            color: white;
            padding: 15px;
            border-radius: 12px;
            display: none;
            z-index: 4000;
            font-size: 0.85rem;
        }
        
        .error-log.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Loading Panel -->
    <div class="loading-panel" id="loadingPanel">
        <div class="loading-logo">📊</div>
        <div class="loading-title">Loading Customers...</div>
        <div class="loading-text">Fetching data from Google Sheets</div>
        <div class="error-panel" id="errorPanel">
            <div id="errorMessage"></div>
        </div>
    </div>
    
    <!-- Error Log -->
    <div class="error-log" id="errorLog"></div>
    
    <!-- Sync Indicator -->
    <div class="sync-indicator">
        <div class="sync-dot" id="syncDot"></div>
        <div>
            <span id="syncText">Connecting...</span>
            <div style="font-size: 0.75rem; color: #64748b;" id="lastSync">--</div>
        </div>
    </div>
    
    <!-- Map -->
    <div id="map"></div>
    
    <!-- Floating Buttons -->
    <div class="fab-container">
        <div class="fab" onclick="recenterMap()">📍</div>
        <div class="fab" onclick="togglePanel()">📋</div>
        <div class="fab" onclick="refreshData()">🔄</div>
    </div>
    
    <!-- Proximity Indicator -->
    <div class="proximity-indicator" id="proximityIndicator">
        <span>🎯</span>
        <span id="proximityText">Customer Nearby!</span>
    </div>
    
    <!-- Main Control Panel -->
    <div class="control-panel" id="controlPanel">
        <div class="panel-handle" onclick="togglePanel()"></div>
        
        <h2>
            <span>🛡️</span>
            Sales Tracker <small style="font-size: 0.7rem; color: #64748b;">(>30 days inactive)</small>
        </h2>
        
        <div id="trackingStatus" class="status-badge status-inactive">
            <span>●</span> GPS Off
        </div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="nearbyCount">0</div>
                <div class="stat-label">Nearby</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="visitedCount">0</div>
                <div class="stat-label">Visited</div>
            </div>
        </div>
        
        <button class="btn btn-primary" id="gpsBtn" onclick="startTracking()">
            <span>📡</span> Start GPS Tracking
        </button>
        
        <div class="customer-list">
            <h3>Inactive Customers (>30 days)</h3>
            <div id="customerItems"></div>
        </div>
    </div>
    
    <!-- Notification -->
    <div class="notification" id="notification">
        <div class="notification-icon">✓</div>
        <div>
            <div style="font-weight: 700; font-size: 1.1rem;" id="notifTitle">Success</div>
            <div style="font-size: 0.9rem; opacity: 0.8;" id="notifMessage">Operation completed</div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION - CHANGE THESE
        // ==========================================
        
        // Your Google API Key (restricted to your domain)
        const API_KEY = "AIzaSyDdHi3CRLWDyBkLyoUwUaTcid28FhAgmpg";
        // Your Google Sheet ID (from the URL)
        const SHEET_ID = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvT6w3QucvuRaPsmsWQfHuF3E7TJchVkFOhpm7_m-iIsE3EiRjL6sYuaVySJrnXQSJYRTzhj447xC7/pubhtml?gid=1075129880&single=true";
        // Range to fetch (Customers sheet, columns A-G)
        const RANGE = "Customers!A2:G";
        
        // ==========================================
        // GLOBAL VARIABLES
        // ==========================================
        
        let map;
        let agentMarker;
        let customerMarkers = {};
        let inactiveCustomers = [];
        let proximityThreshold = 100; // meters
        let isTracking = false;
        let watchId = null;
        let visitedCustomers = new Set(); // Track visited in this session
        
        // ==========================================
        // INITIALIZATION
        // ==========================================
        
        async function init() {
            initMap();
            await loadCustomers();
        }

        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                tap: true
            }).setView([8.49, -13.24], 15);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
            
            L.control.zoom({ position: 'bottomright' }).addTo(map);
        }

        // ==========================================
        // GOOGLE SHEETS DATA LOADING
        // ==========================================
        
        async function loadCustomers() {
            updateSyncStatus('syncing');
            
            try {
                // Construct the API URL
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const rows = data.values || [];
                
                // Process and filter customers
                inactiveCustomers = [];
                let skippedCount = 0;
                
                rows.forEach((row, index) => {
                    // Skip if row doesn't have enough columns
                    if (row.length < 7) {
                        console.warn(`Skipping row ${index + 2}: insufficient data`);
                        return;
                    }
                    
                    const customer = {
                        id: row[0],
                        name: row[1] || 'Unknown',
                        lat: parseFloat(row[2]),
                        lng: parseFloat(row[3]),
                        address: row[4] || 'No address',
                        daysInactive: parseInt(row[5]) || 0,
                        volume: parseFloat(row[6]) || 0
                    };
                    
                    // Filter: Only customers inactive for MORE than 30 days
                    if (customer.daysInactive > 30 && !isNaN(customer.lat) && !isNaN(customer.lng)) {
                        inactiveCustomers.push(customer);
                        console.log("Inactive:", customer.name, `(${customer.daysInactive} days)`);
                    } else {
                        skippedCount++;
                        if (customer.daysInactive <= 30) {
                            console.log(`Skipped (not inactive enough): ${customer.name} (${customer.daysInactive} days)`);
                        }
                    }
                });
                
                // Add markers to map
                inactiveCustomers.forEach(customer => {
                    addCustomerMarker(customer);
                });
                
                // Update UI
                updateCustomerList();
                updateStats();
                updateSyncStatus('online');
                
                const now = new Date();
                document.getElementById('lastSync').textContent = 'Loaded: ' + now.toLocaleTimeString();
                
                // Hide loading panel
                document.getElementById('loadingPanel').classList.add('hidden');
                
                showNotification('Data Loaded', `${inactiveCustomers.length} inactive customers found`);
                
            } catch (err) {
                console.error('Failed to load customers:', err);
                showError('Failed to load data: ' + err.message);
                document.getElementById('errorMessage').textContent = err.message;
                document.getElementById('errorPanel').style.display = 'block';
                updateSyncStatus('error');
            }
        }

        function addCustomerMarker(customer) {
            const marker = L.circleMarker([customer.lat, customer.lng], {
                radius: 16,
                fillColor: '#ef4444',
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map);

            marker.bindPopup(`
                <div style="font-family: system-ui; padding: 12px;">
                    <h3 style="margin: 0 0 8px 0; color: #ef4444; font-size: 1.1rem;">${customer.name}</h3>
                    <p style="margin: 4px 0; color: #475569; font-size: 0.9rem;">
                        📍 ${customer.address}<br>
                        ⏰ ${customer.daysInactive} days inactive<br>
                        📦 Volume: ${customer.volume}
                    </p>
                </div>
            `);

            customerMarkers[customer.id] = {
                marker: marker,
                data: customer,
                nearby: false
            };
        }

        // ==========================================
        // GPS & PROXIMITY
        // ==========================================
        
        function startTracking() {
            if (!navigator.geolocation) {
                alert('GPS not supported on this device');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    onGPSSuccess(position);
                    watchId = navigator.geolocation.watchPosition(
                        (pos) => {
                            const { latitude, longitude } = pos.coords;
                            updateAgentPosition(latitude, longitude);
                            checkProximity(latitude, longitude);
                        },
                        (err) => console.error('Watch error:', err),
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
                    );
                },
                (error) => {
                    alert('GPS Error: ' + error.message);
                    console.error('GPS Error:', error);
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        function onGPSSuccess(position) {
            const { latitude, longitude } = position.coords;
            updateAgentPosition(latitude, longitude);
            checkProximity(latitude, longitude);
            
            document.getElementById('trackingStatus').className = 'status-badge status-active';
            document.getElementById('trackingStatus').innerHTML = '<span>●</span> GPS Active';
            document.getElementById('gpsBtn').disabled = true;
            document.getElementById('gpsBtn').innerHTML = '<span>📡</span> GPS Running';
        }

        function updateAgentPosition(lat, lng) {
            if (!agentMarker) {
                const icon = L.divIcon({
                    className: 'agent-marker',
                    html: '<div style="background: #0ea5e9; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center;">📍</div>',
                    iconSize: [40, 40]
                });
                agentMarker = L.marker([lat, lng], { icon: icon }).addTo(map);
                map.flyTo([lat, lng], 17);
            } else {
                agentMarker.setLatLng([lat, lng]);
            }
        }

        function checkProximity(agentLat, agentLng) {
            let nearbyCount = 0;
            let nearestCustomer = null;
            let minDistance = Infinity;
            
            Object.entries(customerMarkers).forEach(([id, customer]) => {
                // Skip if already visited in this session
                if (visitedCustomers.has(id)) return;
                
                const distance = calculateDistance(
                    agentLat, agentLng,
                    customer.data.lat, customer.data.lng
                );
                
                const isNearby = distance <= proximityThreshold;
                
                if (isNearby) {
                    nearbyCount++;
                    if (distance < minDistance) {
                        minDistance = distance;
                        nearestCustomer = customer;
                    }
                }
                
                if (isNearby && !customer.nearby) {
                    customer.nearby = true;
                    customer.marker.setStyle({ fillColor: '#f59e0b', radius: 20 });
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                } else if (!isNearby && customer.nearby) {
                    customer.nearby = false;
                    customer.marker.setStyle({ fillColor: '#ef4444', radius: 16 });
                }
                
                updateDistanceDisplay(id, distance, isNearby);
            });
            
            // Update proximity indicator
            const indicator = document.getElementById('proximityIndicator');
            if (nearestCustomer) {
                indicator.classList.add('show');
                document.getElementById('proximityText').textContent = 
                    `Near ${nearestCustomer.data.name}! (${Math.round(minDistance)}m)`;
            } else {
                indicator.classList.remove('show');
            }
            
            // Update stats
            document.getElementById('nearbyCount').textContent = nearbyCount;
            
            updateCustomerList();
        }

        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371e3; // Earth radius in meters
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lng2 - lng1) * Math.PI / 180;
            
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            return R * c;
        }

        function updateDistanceDisplay(id, distance, nearby) {
            const badge = document.getElementById(`distance-${id}`);
            if (!badge) return;
            
            if (nearby) {
                badge.className = 'distance-badge reached';
                badge.textContent = '✓ NEAR';
            } else {
                badge.className = 'distance-badge';
                badge.textContent = distance < 1000 ? `${Math.round(distance)}m` : `${(distance/1000).toFixed(1)}km`;
            }
        }

        // ==========================================
        // VISIT MANAGEMENT (Session-only, no write to sheet)
        // ==========================================
        
        function markVisited(id) {
            const customer = customerMarkers[id];
            if (!customer) return;
            
            // Add to visited set
            visitedCustomers.add(id);
            
            // Visual feedback
            customer.marker.setStyle({ fillColor: '#10b981', fillOpacity: 0.5 });
            
            // Fade out and remove
            let opacity = 1;
            const fadeInterval = setInterval(() => {
                opacity -= 0.1;
                customer.marker.setStyle({ fillOpacity: opacity * 0.5, opacity: opacity });
                if (opacity <= 0) {
                    clearInterval(fadeInterval);
                    map.removeLayer(customer.marker);
                    delete customerMarkers[id];
                }
            }, 100);
            
            // Update UI
            updateStats();
            updateCustomerList();
            
            // Celebration
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#10b981', '#0ea5e9', '#f59e0b']
            });
            
            showNotification(customer.data.name + ' visited!', 'Marked as completed');
        }

        // ==========================================
        // UI UPDATES
        // ==========================================
        
        function updateCustomerList() {
            const container = document.getElementById('customerItems');
            
            // Sort: nearby first, then by days inactive (descending)
            const sorted = inactiveCustomers
                .filter(c => !visitedCustomers.has(c.id))
                .sort((a, b) => {
                    const aNear = customerMarkers[a.id]?.nearby || false;
                    const bNear = customerMarkers[b.id]?.nearby || false;
                    if (aNear && !bNear) return -1;
                    if (!aNear && bNear) return 1;
                    return b.daysInactive - a.daysInactive; // Most inactive first
                });
            
            if (sorted.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 30px; color: #94a3b8;"><div style="font-size: 3rem;">✅</div>All done!</div>';
                return;
            }
            
            container.innerHTML = sorted.map(customer => {
                const isNearby = customerMarkers[customer.id]?.nearby || false;
                
                return `
                <div class="customer-item ${isNearby ? 'nearby' : ''}" id="customer-${customer.id}">
                    <div class="customer-header">
                        <div class="customer-info">
                            <h4>${customer.name}</h4>
                            <div class="customer-meta">
                                📍 ${customer.address}<br>
                                ⏰ ${customer.daysInactive} days inactive<br>
                                📦 Vol: ${customer.volume}
                            </div>
                        </div>
                        <div class="distance-badge ${isNearby ? 'reached' : ''}" id="distance-${customer.id}">
                            ${isNearby ? '✓ NEAR' : '--'}
                        </div>
                    </div>
                    ${isNearby ? `
                    <button class="btn btn-success" onclick="markVisited('${customer.id}')" style="margin-top: 10px; padding: 10px;">
                        ✓ MARK VISITED
                    </button>
                    ` : ''}
                </div>
                `;
            }).join('');
        }

        function updateStats() {
            const total = inactiveCustomers.length;
            const visited = visitedCustomers.size;
            const remaining = total - visited;
            
            // Count nearby
            const nearby = Object.values(customerMarkers).filter(c => c.nearby && !visitedCustomers.has(c.data.id)).length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('visitedCount').textContent = visited;
            document.getElementById('nearbyCount').textContent = nearby;
        }

        function updateSyncStatus(status) {
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            
            dot.className = 'sync-dot';
            
            if (status === 'online') {
                dot.classList.add('online');
                text.textContent = 'Live';
            } else if (status === 'syncing') {
                dot.classList.add('syncing');
                text.textContent = 'Loading...';
            } else if (status === 'error') {
                text.textContent = 'Error';
            }
        }

        function showNotification(title, message) {
            const notif = document.getElementById('notification');
            document.getElementById('notifTitle').textContent = title;
            document.getElementById('notifMessage').textContent = message;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function showError(msg) {
            const log = document.getElementById('errorLog');
            log.textContent = msg;
            log.classList.add('show');
            setTimeout(() => log.classList.remove('show'), 5000);
            console.error(msg);
        }

        function togglePanel() {
            const panel = document.getElementById('controlPanel');
            // Simple toggle - you can enhance this
            panel.style.transform = panel.style.transform === 'translateY(50%)' ? 'translateY(0)' : 'translateY(50%)';
        }

        function recenterMap() {
            if (agentMarker) {
                map.flyTo(agentMarker.getLatLng(), 17);
            } else {
                // Center on all customers if no GPS
                const group = new L.featureGroup(Object.values(customerMarkers).map(c => c.marker));
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        async function refreshData() {
            // Clear existing markers
            Object.values(customerMarkers).forEach(c => map.removeLayer(c.marker));
            customerMarkers = {};
            visitedCustomers.clear();
            
            updateSyncStatus('syncing');
            await loadCustomers();
            showNotification('Refreshed', 'Latest data from Google Sheets');
        }

        // Start the app
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
